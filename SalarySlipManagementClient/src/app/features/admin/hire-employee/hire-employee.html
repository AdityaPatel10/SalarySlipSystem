<div
  class="bg-[#15151c] border border-[#2a2a36] rounded-[1.5rem] p-8 shadow-2xl max-w-4xl mx-auto mt-4"
>
  <div class="mb-8 border-b border-[#2a2a36] pb-6">
    <h2 class="text-2xl font-semibold text-white">Hire New Employee</h2>
    <p class="text-gray-400 mt-2 text-sm">Enter the employee details to generate their account.</p>
  </div>

  <!-- Notifications -->
  <div
    *ngIf="successMessage"
    class="mb-6 p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-green-400 text-sm flex items-center"
  >
    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
      ></path>
    </svg>
    {{ successMessage }}
  </div>

  <div
    *ngIf="errorMessage"
    class="mb-6 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center"
  >
    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      ></path>
    </svg>
    {{ errorMessage }}
  </div>

  <form [formGroup]="hireForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >Full Name <span class="text-red-500">*</span></label
        >
        <input
          type="text"
          formControlName="name"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm"
          placeholder="John Doe"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >Enterprise Email <span class="text-red-500">*</span></label
        >
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm"
          placeholder="john.doe@enterprise.com"
        />
      </div>

      <!-- Initial Password -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >Initial Password <span class="text-red-500">*</span></label
        >
        <input
          type="text"
          formControlName="password"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm"
          placeholder="Temp@123"
        />
        <div
          *ngIf="hireForm.get('password')?.touched && hireForm.get('password')?.hasError('pattern')"
          class="text-red-500 text-xs mt-1"
        >
          Password must contain at least one uppercase letter, one lowercase letter, one number, and
          one special character (e.g. Test@123).
        </div>
      </div>

      <!-- Date of Joining
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >Date of Joining <span class="text-red-500">*</span></label
        >
        <input
          type="date"
          formControlName="dateOfJoining"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm [color-scheme:dark]"
        />
      </div> -->

      <!-- Department Dropdown -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >Department <span class="text-red-500">*</span></label
        >
        <select
          formControlName="departmentId"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm appearance-none"
        >
          <option value="">Select a Department</option>
          <!-- Using real data from SQL Server -->
          <option *ngFor="let dept of departments" [value]="dept.globalId">
            {{ dept.departmentName }}
          </option>
        </select>
      </div>

      <!-- Role Dropdown -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2"
          >System Role <span class="text-red-500">*</span></label
        >
        <select
          formControlName="roleId"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm appearance-none"
        >
          <option value="">Select a Role</option>
          <!-- Using real data from SQL Server -->
          <option *ngFor="let role of roles" [value]="role.globalId">
            {{ role.roleName }}
          </option>
        </select>
      </div>

      <!-- Phone Number -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Phone Number</label>
        <input
          type="text"
          formControlName="phoneNumber"
          (keypress)="preventAlphabets($event)"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm"
          placeholder="+1 234 567 890"
        />
      </div>

      <!-- Bank Account -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-2">Bank Account Number</label>
        <input
          type="text"
          formControlName="bankAccountNumber"
          class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none transition-all text-sm"
          placeholder="1234567890"
        />
      </div>
    </div>

    <div class="pt-6 flex justify-end">
      <button
        type="submit"
        [disabled]="hireForm.invalid || isLoading"
        class="px-8 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all disabled:opacity-50"
      >
        <span *ngIf="!isLoading">Create Employee</span>
        <span *ngIf="isLoading" class="animate-pulse">Saving...</span>
      </button>
    </div>
  </form>
</div>
