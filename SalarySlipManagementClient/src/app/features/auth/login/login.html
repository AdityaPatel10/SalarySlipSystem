<div class="min-h-screen flex items-center justify-center bg-[#07070b]">
  <div
    class="max-w-md w-full mx-4 p-8 rounded-[1.5rem] bg-[#15151c] border border-[#2a2a36] shadow-2xl"
  >
    <!-- STEP 0: LOGIN -->
    <div *ngIf="currentStep === 0">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold text-white">Login to your account</h2>
      </div>

      <!-- Switched to [formGroup]="loginForm" -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div
          *ngIf="errorMessage"
          class="p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm text-center"
        >
          {{ errorMessage }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
          <!-- Switched to formControlName="email" -->
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm"
            placeholder="admin@enterprise.com"
          />
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="block text-sm font-medium text-gray-400">Password</label>
            <a
              (click)="$event.preventDefault(); setStep(1)"
              href="#"
              class="text-sm font-medium text-gray-500 hover:text-gray-300 transition-colors"
              >Forgot ?</a
            >
          </div>
          <div class="relative">
            <!-- Switched to formControlName="password" -->
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm pr-12"
              placeholder="Enter your password"
            />

            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 focus:outline-none"
            >
              <svg
                *ngIf="!showPassword"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                ></path>
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                ></path>
              </svg>
              <svg
                *ngIf="showPassword"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="!loginForm.valid || isLoading"
          class="w-full py-3 px-4 mt-2 bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-medium rounded-xl shadow-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center"
        >
          <span *ngIf="!isLoading">Login now</span>
          <span *ngIf="isLoading" class="animate-pulse">Authenticating...</span>
        </button>
      </form>
    </div>

    <!-- STEP 1: REQUEST OTP -->
    <div *ngIf="currentStep === 1">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold text-white">Reset Password</h2>
        <p class="text-gray-400 text-sm mt-2">
          Enter your email or phone number to receive a 6-digit code.
        </p>
      </div>
      <form [formGroup]="requestOtpForm" (ngSubmit)="onRequestOtpSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Email or Phone Number</label>
          <input
            type="text"
            formControlName="emailOrPhone"
            class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm"
            placeholder="user@company.com or 555-1234"
          />
        </div>
        <button
          type="submit"
          [disabled]="!requestOtpForm.valid || isLoading"
          class="w-full py-3 px-4 mt-2 bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-medium rounded-xl shadow-lg transition-colors disabled:opacity-50 flex justify-center items-center"
        >
          <span *ngIf="!isLoading">Send Code</span>
          <span *ngIf="isLoading" class="animate-pulse">Sending...</span>
        </button>
        <div class="text-center">
          <a
            href="#"
            (click)="$event.preventDefault(); setStep(0)"
            class="text-sm font-medium text-gray-500 hover:text-gray-300"
            >Back to Login</a
          >
        </div>
      </form>
    </div>
    <!-- STEP 2: VERIFY OTP -->
    <div *ngIf="currentStep === 2">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold text-white">Enter Security Code</h2>
        <p class="text-gray-400 text-sm mt-2">
          Check your browser console for the simulated OTP code!
        </p>
      </div>
      <form [formGroup]="verifyOtpForm" (ngSubmit)="onVerifyOtpSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">6-Digit Code</label>
          <input
            type="text"
            formControlName="otpCode"
            maxlength="6"
            class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm tracking-[0.5em] text-center text-xl font-mono"
            placeholder="••••••"
          />
        </div>
        <button
          type="submit"
          [disabled]="!verifyOtpForm.valid || isLoading"
          class="w-full py-3 px-4 mt-2 bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-medium rounded-xl shadow-lg transition-colors disabled:opacity-50 flex justify-center items-center"
        >
          <span *ngIf="!isLoading">Verify Code</span>
          <span *ngIf="isLoading" class="animate-pulse">Verifying...</span>
        </button>
        <div class="text-center">
          <a
            href="#"
            (click)="$event.preventDefault(); setStep(1)"
            class="text-sm font-medium text-gray-500 hover:text-gray-300"
            >Change Contact Info</a
          >
        </div>
      </form>
    </div>
    <!-- STEP 3: RESET PASSWORD -->
    <div *ngIf="currentStep === 3">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold text-white">Set New Password</h2>
      </div>
      <form [formGroup]="resetPasswordForm" (ngSubmit)="onResetPasswordSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">New Password</label>
          <input
            type="password"
            formControlName="newPassword"
            class="w-full px-4 py-3 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all text-sm"
            placeholder="Enter new password"
          />
        </div>
        <button
          type="submit"
          [disabled]="!resetPasswordForm.valid || isLoading"
          class="w-full py-3 px-4 mt-2 bg-green-600 hover:bg-green-500 text-white font-medium rounded-xl shadow-lg transition-colors disabled:opacity-50 flex justify-center items-center"
        >
          <span *ngIf="!isLoading">Save Password & Login</span>
          <span *ngIf="isLoading" class="animate-pulse">Saving...</span>
        </button>
      </form>
    </div>
  </div>
</div>
