<div class="flex h-screen bg-[#07070b] text-white overflow-hidden">
  <!-- slidebar -->
  <aside class="w-64 bg-[#15151c] border-r border-[#2a2a36] flex flex-col">
    <!-- logo area  -->
    <div class="h-16 flex items-center px-6 border-b border-[#2a2a36]">
      <div
        class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center mr-3 shadow-lg shadow-blue-500/30"
      >
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
      </div>
      <span class="text-lg font-bold tracking-tight">Enterprise HR</span>
    </div>

    <!-- Navigation Links -->

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      <!-- routerLinkActive applies the blue color when we are ON that specific page! -->

      <a
        routerLink="/dashboard"
        routerLinkActive="bg-blue-600/10 text-blue-500 border-blue-500"
        class="flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-[#20202b] rounded-xl transition-all border border-transparent"
      >
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
          ></path>
        </svg>
        Dashboard
      </a>

      <!-- We will build this page in Phase 3 -->

      <a
        routerLink="/dashboard/hire"
        routerLinkActive="bg-blue-600/10 text-blue-500 border-blue-500"
        class="flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-[#20202b] rounded-xl transition-all border border-transparent"
      >
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
          ></path>
        </svg>
        Hire Employee
      </a>
      <a
        routerLink="/dashboard/settings"
        routerLinkActive="bg-blue-600/10 text-blue-500 border-blue-500"
        class="flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-[#20202b] rounded-xl transition-all border border-transparent"
      >
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
        Master Data
      </a>
    </nav>

    <!-- Logout Button -->

    <div class="p-4 border-t border-[#2a2a36]">
      <button
        (click)="onLogout()"
        class="flex items-center w-full px-4 py-3 text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-xl transition-all"
      >
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          ></path>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->

  <main class="flex-1 flex flex-col relative overflow-hidden">
    <!-- Navbar -->

    <header
      class="h-16 flex items-center justify-between px-8 bg-[#15151c]/80 backdrop-blur-md border-b border-[#2a2a36] z-10"
    >
      <h2 class="text-lg font-medium text-gray-200">Admin Portal</h2>
      <div class="flex items-center">
        <div
          class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold"
        >
          A
        </div>
      </div>
    </header>

    <!-- The Magic Child Route Placeholder! -->

    <div class="flex-1 overflow-auto p-8 relative z-0">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
