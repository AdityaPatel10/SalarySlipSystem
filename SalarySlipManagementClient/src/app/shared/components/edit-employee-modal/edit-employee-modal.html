<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <div
    class="bg-[#15151c] border border-[#2a2a36] rounded-[1.5rem] p-8 shadow-2xl w-full max-w-2xl transform transition-all"
  >
    <div class="flex justify-between items-center mb-6 border-b border-[#2a2a36] pb-4">
      <h3 class="text-xl font-bold text-white">Edit Profile</h3>
      <button (click)="close.emit()" class="text-gray-400 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="submitEdit()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
          <input
            type="text"
            formControlName="name"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm"
          />
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Phone Number</label>
          <input
            type="text"
            formControlName="phoneNumber"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm"
          />
        </div>

        <!-- Bank Account -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Bank Account</label>
          <input
            type="text"
            formControlName="bankAccountNumber"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm"
          />
        </div>

        <!-- Department -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Department</label>
          <select
            formControlName="departmentId"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm appearance-none"
          >
            <option *ngFor="let dept of departments" [value]="dept.globalId">
              {{ dept.departmentName }}
            </option>
          </select>
        </div>

        <!-- Role -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">Role</label>
          <select
            formControlName="roleId"
            class="w-full px-4 py-2 rounded-xl bg-[#0f0f15] border border-[#2a2a36] text-white focus:border-blue-500 focus:outline-none text-sm appearance-none"
          >
            <option *ngFor="let role of roles" [value]="role.globalId">{{ role.roleName }}</option>
          </select>
        </div>
      </div>

      <div class="pt-6 flex justify-end space-x-3">
        <button
          type="button"
          (click)="close.emit()"
          class="px-6 py-2 bg-gray-600 hover:bg-gray-500 text-white font-medium rounded-xl transition-all"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="editForm.invalid || isLoading"
          class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl shadow-lg shadow-blue-500/30 transition-all disabled:opacity-50"
        >
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
